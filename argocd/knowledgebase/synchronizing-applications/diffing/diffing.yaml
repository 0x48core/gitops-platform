apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: production-app
  namespace: argocd
spec:
  source:
    repoURL: https://github.com/my-org/my-app
    targetRevision: main
    path: k8s/
  destination:
    server: https://kubernetes.default.svc
    namespace: production

  ignoreDifferences:
    # HPA manages replicas
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas

    # Istio inject sidecar automatically
    - group: apps
      kind: Deployment
      jqPathExpressions:
        - .spec.template.spec.containers[] | select(.name == "istio-proxy")
        - .spec.template.spec.initContainers[] | select(.name == "istio-init")

    # Ignore fields managed by kube-controller-manager
    - group: apps
      kind: Deployment
      managedFieldsManagers:
        - kube-controller-manager

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - RespectIgnoreDifferences=true  # Important