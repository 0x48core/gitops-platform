apiVersion: batch/v1
kind: Job
metadata:
  name: notify-deployment
  annotations:
    argocd.argoproj.io/hook: PostSync
spec:
  template:
    spec:
      containers:
        - name: notifier
          image: curlimages/curl
          command:
            - curl
            - -X POST
            - https://hooks.slack.com/services/xxx
            - -d '{"text":"Deployment completed!"}'
      restartPolicy: Never